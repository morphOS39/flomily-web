<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flomily — Du bist dabei!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .danke {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(150deg, #2A9D8F 0%, #3DBBAD 40%, #5CC9BA 100%);
            color: #fff;
            text-align: center;
        }
        .danke-content {
            max-width: 500px;
            padding: 40px 24px;
        }
        .danke-emoji {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        .danke h1 {
            font-size: 2.2rem;
            margin-bottom: 16px;
        }
        .danke p {
            font-size: 1.1rem;
            opacity: 0.92;
            margin-bottom: 12px;
            line-height: 1.6;
        }
        .danke-back {
            display: inline-block;
            margin-top: 24px;
            color: #fff;
            text-decoration: none;
            font-weight: 700;
            padding: 12px 28px;
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 50px;
            transition: all 0.2s;
        }
        .danke-back:hover {
            background: rgba(255,255,255,0.15);
            border-color: #fff;
        }
    </style>
</head>
<body>
    <section class="danke">
        <div class="danke-content">
            <div class="danke-emoji">🎉</div>
            <h1>Du bist dabei!</h1>
            <p>Willkommen bei den ersten Flo'ern. Wir melden uns, sobald flomily startet.</p>
            <p>Bis dahin: Lehn dich zurück. Wir kümmern uns bald um deine Termine.</p>
            <a href="index.html" class="danke-back">← Zurück zur Startseite</a>
        </div>
    </section>
</body>
</html>
