<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flomily Beta — Bald geht's los</title>
    <meta name="description" content="flomily Beta — Du gehörst zu den Ersten.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .beta-hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(150deg, #2A9D8F 0%, #3DBBAD 40%, #5CC9BA 100%);
            color: #fff;
            text-align: center;
        }
        .beta-content {
            max-width: 560px;
            padding: 40px 24px;
        }
        .beta-content h1 {
            font-size: 2.6rem;
            margin-bottom: 20px;
            line-height: 1.2;
        }
        .beta-content p {
            font-size: 1.15rem;
            opacity: 0.92;
            margin-bottom: 16px;
            line-height: 1.7;
        }
        .beta-badge {
            display: inline-block;
            background: rgba(255,255,255,0.18);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 28px;
            letter-spacing: 0.5px;
        }
        .beta-back {
            display: inline-block;
            margin-top: 32px;
            color: #fff;
            text-decoration: none;
            font-weight: 700;
            padding: 12px 28px;
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 50px;
            transition: all 0.2s;
        }
        .beta-back:hover {
            background: rgba(255,255,255,0.15);
            border-color: #fff;
        }
        .beta-footer {
            text-align: center;
            padding: 20px;
            font-size: 0.85rem;
        }
        .beta-footer a {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            margin: 0 8px;
        }
        .beta-footer a:hover {
            color: #fff;
        }
    </style>
</head>
<body>
    <section class="beta-hero">
        <div class="beta-content">
            <div class="beta-badge">Closed Beta</div>
            <h1>Etwas braut sich zusammen...</h1>
            <p>Du gehörst zu den Ersten, die flomily ausprobieren werden. Wir arbeiten gerade an den letzten Details.</p>
            <p>Mehr kommt bald.</p>
            <a href="/" class="beta-back">← Zur Startseite</a>
        </div>
    </section>
    <div class="beta-footer">
        <a href="/impressum">Impressum</a> | <a href="/datenschutz">Datenschutz</a>
    </div>
</body>
</html>
