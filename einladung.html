    <script>
    // Extract ref code from path: /einladung/REF-XXXXXX or /einladung?ref=REF-XXXXXX
    var path = location.pathname;
    var ref = path.split('/einladung/')[1] || new URLSearchParams(location.search).get('ref') || '';
    ref = ref.replace(/[^A-Z0-9\-]/gi, ''); // sanitize
    location.replace('/?ref=' + ref + '#warteliste');
